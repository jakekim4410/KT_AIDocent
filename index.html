<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KT AI 도슨트 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* KT 전용 브랜드 서체 (Y유니버스체) 웹폰트 적용 */
        @font-face {
            font-family: 'YUniverse';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_yuniverse@1.0/YUniverse-L.woff2') format('woff2');
            font-weight: 300;
            font-style: normal;
        }
        @font-face {
            font-family: 'YUniverse';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_yuniverse@1.0/YUniverse-L.woff2') format('woff2');
            font-weight: 400; 
            font-style: normal;
        }
        @font-face {
            font-family: 'YUniverse';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_yuniverse@1.0/YUniverse-B.woff2') format('woff2');
            font-weight: 500; 
            font-style: normal;
        }
        @font-face {
            font-family: 'YUniverse';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_yuniverse@1.0/YUniverse-B.woff2') format('woff2');
            font-weight: 700; 
            font-style: normal;
        }

        body {
            font-family: 'YUniverse', sans-serif;
            background: radial-gradient(circle at top right, #004e92, #000428);
            color: white;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 키 비주얼 배경 효과 */
        .bg-curves {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.6;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1) 0%, transparent 50%),
                        linear-gradient(225deg, rgba(72, 198, 239, 0.1) 0%, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: #00f2fe;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #ec008c 0%, #fc6767 100%);
            transition: all 0.3s;
        }

        .btn-gradient:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* 화면 전환을 위한 클래스 */
        .step-content { 
            display: none; 
            min-height: 100vh;
        }
        .step-content.active { 
            display: flex; 
            flex-direction: column;
            animation: fadeIn 0.4s ease-out forwards; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .keyword-badge {
            background: rgba(0, 242, 254, 0.15);
            color: #00f2fe;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 242, 254, 0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="bg-curves"></div>

    <div class="max-w-md mx-auto w-full px-6 py-8">
        
        <!-- STEP 1: 대기 화면 -->
        <div id="step1" class="step-content active justify-center">
            
            <!-- 히어로 이미지 & 로고 컨테이너 -->
            <div class="relative w-full mb-8 mt-2">
                <div class="absolute inset-0 bg-gradient-to-r from-cyan-500 to-purple-500 blur-xl opacity-30 rounded-2xl"></div>
                
                <div class="relative rounded-2xl shadow-2xl border border-white/10 overflow-hidden">
                    
                    <!-- 상단 로고 컨테이너 -->
                    <div class="absolute top-4 left-4 md:top-5 md:left-5 z-10">
                        <!-- 배경을 하얀색 반투명(bg-white/95)으로 변경하여 검은색 글자가 잘 보이게 처리 -->
                        <div class="bg-white/95 backdrop-blur-xl px-5 py-2.5 rounded-full border border-gray-200/50 flex items-center justify-center gap-3 shadow-[0_4px_12px_rgba(0,0,0,0.3)]">
                            
                            <!-- 공식 KT 로고 이미지 -->
                            <img src="https://wsgadd.kt.com/smart/images/app/logo.png" 
                                 alt="KT" 
                                 class="h-4 md:h-5 object-contain">

                            <!-- 로고 사이의 구분선 (회색으로 변경) -->
                            <span class="text-gray-300 text-[11px] md:text-xs pb-[1px]">|</span>

                            <!-- PART 텍스트 (어두운 색으로 변경) -->
                            <span class="text-gray-800 font-bold text-xs md:text-sm tracking-widest pt-[1px]">PART</span>
                        </div>
                    </div>

                    <!-- 배경 이미지 -->
                    <img src="https://news.microsoft.com/source/asia/wp-content/uploads/2026/03/SaveTheDate_MS-AI-Tour_FY26_Generic-e1772672566710-1585x1268.png" 
                         alt="AI Tour Key Visual" 
                         class="w-full h-auto object-cover">
                </div>
            </div>

            <!-- 도슨트 안내 문구 -->
            <div class="pb-6 text-center">
                <p class="text-cyan-400 font-medium mb-3 text-lg">✦ KT AI 도슨트 서비스</p>
                <h2 class="text-[1.65rem] font-bold leading-snug break-keep">일은 늘 바쁜데,<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">손이 많이 가는 부분은 어디인가요?</span></h2>
                <p class="text-gray-400 mt-4 text-sm break-keep">AI가 딱 맞는 KT의 AX 솔루션 부스로 안내해드립니다.</p>
            </div>

            <button onclick="goToStep(2)" class="btn-gradient w-full py-5 rounded-2xl text-xl font-bold shadow-[0_10px_20px_rgba(236,0,140,0.3)] mt-2 tracking-wide">
                내 업무 문제 해결하기 →
            </button>

            <!-- 2열 배치 수치 데이터 -->
            <div class="grid grid-cols-2 gap-4 mt-10 text-center text-sm text-gray-400 max-w-xs mx-auto">
                <div class="glass-card p-4">
                    <div class="text-cyan-400 font-bold text-2xl mb-1">9</div>
                    AX 솔루션 전시
                </div>
                <div class="glass-card p-4">
                    <div class="text-cyan-400 font-bold text-2xl mb-1">10초</div>
                    진단 소요 시간
                </div>
            </div>
        </div>

        <!-- STEP 2: 페인포인트 선택 -->
        <div id="step2" class="step-content py-4">
            <button onclick="goToStep(1)" class="text-gray-400 text-sm mb-6 w-fit hover:text-white transition-colors">← 처음으로</button>
            <h2 class="text-2xl font-bold mb-3 break-keep">업무에서 어떤 어려움이<br>있으신가요?</h2>
            <p class="text-gray-400 mb-8 text-sm break-keep">아래 태그를 눌러 겪고 계신 문제를 선택해보세요.</p>

            <div class="text-sm font-medium text-pink-400 mb-3 flex items-center gap-2">
                <span>📌</span> 우리 팀이 자주 겪는 문제
            </div>
            <div class="grid grid-cols-1 gap-3" id="painpoint-list">
                <!-- JS로 페인포인트가 주입됩니다 -->
            </div>
        </div>

        <!-- STEP 3: 솔루션 결과 -->
        <div id="step3" class="step-content py-4">
            <div class="text-center mb-8">
                <p class="text-cyan-400 font-bold mb-2 text-sm bg-cyan-900/40 inline-block px-4 py-1 rounded-full border border-cyan-700">✦ AI 추천 완료</p>
                <h2 class="text-3xl font-bold mt-4 break-keep">딱 맞는 솔루션을<br>찾았어요!</h2>
            </div>

            <div id="solution-detail" class="glass-card p-7 border-t-4 border-t-cyan-400 mb-6">
                <!-- JS로 솔루션 내용이 주입됩니다 -->
            </div>

            <button onclick="goToStep(2)" class="w-full py-4 rounded-xl border border-gray-600 bg-transparent text-gray-300 font-medium hover:bg-gray-800 hover:text-white hover:border-gray-400 transition-all duration-300 tracking-wide">
                다른 고민 해결하기
            </button>
        </div>

    </div>

    <script>
        const data =[
            { 
                id: 1, 
                emoji: "🔒", 
                pain: "클라우드는 쓰고 싶은데, 데이터가 외부로 나갈까 봐 계속 마음이 불안해요.", 
                title: "Azure with KT SPC", 
                keywords:["하이퍼스케일 클라우드", "데이터 주권", "강력한 암호화"], 
                desc: "데이터 주권 보호에 특화된 글로벌 수준의 한국적 클라우드 서비스입니다.", 
                detail: "보안·안정성 등에서 검증된 글로벌 하이퍼스케일 컴퓨팅 기반 국내 기업 데이터 보안 특화 클라우드 서비스" 
            },
            { 
                id: 2, 
                emoji: "📊", 
                pain: "데이터는 계속 늘어나는데, 인프라가 못 따라와서 속도랑 확장성이 발목을 잡아요.", 
                title: "MAGMA 빅데이터 플랫폼", 
                keywords:["인프라 확장", "빅데이터", "AI 네이티브"], 
                desc: "데이터와 AI 워크로드를 통합하여 인프라의 한계를 극복하고 생산성을 극대화하는 플랫폼입니다.", 
                detail: "통합 데이터 플랫폼 – 데이터•AI 워크로드를 통합해 속도와 확장성 이슈 해결" 
            },
            { 
                id: 3, 
                emoji: "💼", 
                pain: "고객 상황에 맞춰 설명하고 보험 설계까지 가야 하는데, 다 수작업이에요.", 
                title: "AI 보험 세일즈 어시스턴트", 
                keywords:["약관 분석", "상담 자동화", "설계사 지원"], 
                desc: "복잡한 보험 약관을 AI가 즉시 분석해 설계사 상담 지원과 상품 추천을 자동화합니다.", 
                detail: "단순 검색을 넘어 스스로 사고하고 전문가의 지식에서 답을 찾아 최적의 보험 영업 화법 도출" 
            },
            { 
                id: 4, 
                emoji: "🔍", 
                pain: "매뉴얼이 있어도, 현장에서는 바로 쓰기 어렵고 외산 설비는 더 힘들어요.", 
                title: "설비 LLM Agent", 
                keywords:["이미지 RAG", "설비 문서", "제조 특화"], 
                desc: "도면·차트·이미지까지 이해하는 멀티모달 RAG로 현장에서 설비 문서 검색 정확도를 높여드립니다.", 
                detail: "철강 제조업 특화 AI Agent로 Azure OpenAI Supervised Finetuning 적용사례" 
            },
            { 
                id: 5, 
                emoji: "⚡", 
                pain: "GPU만 있으면 바로 시작될 줄 알았는데, 세팅/운영에서 계속 막혀요.", 
                title: "K GPUaaS<br><span class='text-lg'>(K GPU as a Service on Azure)</span>", 
                keywords:["비용 절감", "운영 효율", "온디맨드"], 
                desc: "고성능 GPU를 필요한 만큼만 사용하고, 복잡한 세팅 없이 바로 AI 워크로드를 시작할 수 있어요.", 
                detail: "AI 학습 및 추론을 위한 고성능 GPU 인프라를 국내 리전 데이터센터 기반으로 제공하는 플랫폼" 
            },
            { 
                id: 6, 
                emoji: "🌐", 
                pain: "대형 회의나 웨비나 때는 번역 품질이랑 안정성이 항상 불안합니다.", 
                title: "AI Translator<br><span class='text-lg'>(Teams 실시간 번역 앱)</span>", 
                keywords:["실시간 번역", "다국어 협업", "안정성 보장"], 
                desc: "글로벌 회의에서 다양한 언어를 실시간으로 번역해 언어 장벽 없이 대규모 협업을 지원합니다.", 
                detail: "글로벌 협업을 위한, 동시 다중 번역 기반 엔터프라이즈급 실시간 번역 플랫폼" 
            },
            { 
                id: 7, 
                emoji: "🔄", 
                pain: "견적 한 번 내는 데 사람이 너무 많이 개입돼요.", 
                title: "Azure AI 기반 영업 및 견적 Agent", 
                keywords:["업무 자동화", "시간 절약", "영업 효율 ↑"], 
                desc: "자연어 대화만으로 DB 조회부터 견적 작성, 메일 대응까지 반복 업무를 자동화해드립니다.", 
                detail: "영업 담당자를 위한 LangGraph 기반 멀티스테이지 AI Agent (영업 업무 전반을 자동화)" 
            },
            { 
                id: 8, 
                emoji: "💻", 
                pain: "개발 요구사항이 계속 바뀌는데, 정리는 항상 사람 손이에요.", 
                title: "AxDD<br><span class='text-lg'>(KT AXD + AI Driven Develop)</span>", 
                keywords:["자산 통합", "생산성 향상", "코드 재활용"], 
                desc: "파편화된 개발 자산과 변경되는 요구사항을 하나로 모아 개발 생산성을 극대화합니다.", 
                detail: "AI 기반 자동화로 AX 프로젝트의 요구사항·자산·실행을 하나의 체계로 통합하는 Portal(관리) + CLI(실행)" 
            },
            { 
                id: 9, 
                emoji: "💡", 
                pain: "실제 AX를 도입하려고 하지만, 실행 전략을 해결해줄 컨설팅이 필요해요.", 
                title: "KT Innovation Hub<br>AX Engagement Process", 
                keywords:["기술 협력", "비즈니스 매칭", "인큐베이팅"], 
                desc: "고객 맞춤형 AX 도입 전략과 실행 방안을 도출해주는 전문 컨설팅을 제공합니다.", 
                detail: "성공적인 AX 전환을 위한 KT의 노하우가 담긴 엔터프라이즈 컨설팅 및 인큐베이팅 프로세스" 
            }
        ];

        function goToStep(step) {
            document.querySelectorAll('.step-content').forEach(s => {
                s.classList.remove('active');
            });
            document.getElementById('step' + step).classList.add('active');
            window.scrollTo(0, 0);
        }

        function showSolution(id) {
            const item = data.find(d => d.id === id);
            const detailHtml = `
                <div class="mb-4">
                    <h3 class="text-xl font-bold text-white mb-4 leading-snug break-keep">${item.title}</h3>
                    
                    <div class="flex flex-wrap gap-2 mb-6">
                        ${item.keywords.map(k => `<span class="keyword-badge">${k}</span>`).join('')}
                    </div>

                    <div class="bg-white/5 rounded-xl p-5 mb-6 border border-white/10 shadow-inner">
                        <p class="text-[1.05rem] text-cyan-200 font-medium leading-relaxed mb-4 break-keep">"${item.desc}"</p>
                        <p class="text-sm text-gray-300 leading-relaxed break-keep">· ${item.detail}</p>
                    </div>

                    <div class="bg-[#10121a] border border-gray-700 rounded-2xl p-4 flex items-center gap-4 hover:border-indigo-500/50 transition-colors">
                        <div class="w-[3.5rem] h-[3.5rem] rounded-[0.8rem] border border-indigo-500/60 flex flex-col items-center justify-center bg-indigo-900/20 flex-shrink-0">
                            <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 to-purple-300 font-bold text-sm tracking-wide">안내</span>
                        </div>
                        <div class="flex-1">
                            <h4 class="text-white font-bold text-sm mb-1.5">부스 위치 추후 업데이트</h4>
                            <p class="text-gray-400 text-xs leading-relaxed break-keep">전시 부스로 이동하여 더욱 자세한 설명을 들으실 수 있습니다.<br>(현재 부스 위치는 미확정입니다.)</p>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('solution-detail').innerHTML = detailHtml;
            goToStep(3);
        }

        const listContainer = document.getElementById('painpoint-list');
        data.forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'glass-card px-5 py-4 cursor-pointer flex justify-between items-center group';
            btn.onclick = () => showSolution(item.id);
            btn.innerHTML = `
                <div class="flex items-start gap-3 flex-1 pr-2">
                    <span class="text-[1.3rem] opacity-90 group-hover:scale-110 transition-transform mt-[2px]">${item.emoji}</span>
                    <span class="text-[0.95rem] leading-snug font-medium text-gray-200 group-hover:text-cyan-300 transition-colors text-left break-keep">${item.pain}</span>
                </div>
                <span class="text-gray-500 group-hover:translate-x-1 group-hover:text-cyan-400 transition-all text-xl">→</span>
            `;
            listContainer.appendChild(btn);
        });
    </script>
</body>
</html>
