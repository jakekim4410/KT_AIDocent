<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 도슨트 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: #001a35;
            color: white;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            word-break: keep-all;
        }

        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 80% 10%, rgba(0, 110, 255, 0.3) 0%, transparent 45%),
                radial-gradient(circle at 15% 85%, rgba(0, 242, 254, 0.2) 0%, transparent 45%),
                linear-gradient(160deg, #001224 0%, #002b52 100%);
        }
        .bg-pattern::after {
            content: "";
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse at center, black, transparent 90%);
        }

        .step-content { display: none; width: 100%; min-height: 100vh; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease-out; }

        #step1.active, #step-loading.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes pulse-ai {
            0%, 100% { transform: scale(1); opacity: 0.7; filter: drop-shadow(0 0 5px #00f2fe); }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 20px #00f2fe); }
        }
        @keyframes scan-move {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
        @keyframes wave-ripple {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .ai-core {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .ai-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: white;
            animation: pulse-ai 2s ease-in-out infinite;
            z-index: 10;
        }
        .ai-wave {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            animation: wave-ripple 2s linear infinite;
        }
        .scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f2fe, transparent);
            box-shadow: 0 0 10px #00f2fe;
            animation: scan-move 2.5s ease-in-out infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #ec008c 0%, #fc6767 100%);
            color: white; transition: all 0.3s;
        }

        .highlight { color: #22d3ee; font-weight: 700; }

        @keyframes booth-glow {
            0%, 100% { box-shadow: 0 0 15px var(--booth-color); filter: brightness(1); }
            50% { box-shadow: 0 0 35px var(--booth-color), 0 0 50px var(--booth-color); filter: brightness(1.2); transform: scale(1.03); }
        }
        .animate-booth { background-color: var(--booth-color); animation: booth-glow 1.5s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="max-w-md mx-auto w-full px-5 py-8">
        
        <!-- STEP 1: 메인 -->
        <div id="step1" class="step-content active">
            <div class="relative w-full mb-8">
                <div class="absolute inset-0 bg-cyan-500 blur-[70px] opacity-20 rounded-full"></div>
                <div class="relative rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                    <img src="https://drive.google.com/thumbnail?id=12Ryp494KWwO71h-quh-Kmi7l27rlPX5b&sz=w1000" class="w-full h-auto block">
                </div>
            </div>
            <div class="pb-8 text-center">
                <p class="text-cyan-400 font-bold mb-4 text-xs uppercase tracking-[0.25em]">✦ KT AI 도슨트 서비스</p>
                <h2 class="text-2xl font-black leading-tight tracking-tight">일은 늘 바쁜데,<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">손이 많이 가는 부분은 어디인가요?</span></h2>
                <p class="text-gray-400 mt-4 text-sm px-4">AI가 딱 맞는 KT의 AX 솔루션 부스로 안내해드립니다.</p>
            </div>
            <button onclick="goToStep(2)" class="btn-primary w-full py-5 rounded-2xl text-lg font-bold shadow-xl">내 업무 문제 해결하기 →</button>

            <!-- 수치 데이터 박스 추가 -->
            <div class="grid grid-cols-2 gap-4 mt-12 text-center text-xs text-gray-400 max-w-xs mx-auto">
                <div class="glass-card p-5">
                    <div class="text-cyan-400 font-bold text-2xl mb-1">9</div>
                    AX 솔루션 전시
                </div>
                <div class="glass-card p-5">
                    <div class="text-cyan-400 font-bold text-2xl mb-1">10초</div>
                    진단 소요 시간
                </div>
            </div>
        </div>

        <!-- STEP 2: 리스트 -->
        <div id="step2" class="step-content">
            <button onclick="goToStep(1)" class="text-gray-400 text-sm mb-6 flex items-center gap-1 hover:text-white">← 처음으로</button>
            <h2 class="text-xl font-bold mb-8 leading-snug">업무에서 느끼는<br><span class="text-cyan-400">가장 큰 어려움</span>을 선택해주세요.</h2>
            <div class="flex flex-col gap-4 pb-20" id="painpoint-list"></div>
        </div>

        <!-- STEP LOADING -->
        <div id="step-loading" class="step-content items-center">
            <div class="ai-core mb-10">
                <div class="ai-wave"></div>
                <div class="ai-wave" style="animation-delay: 1s;"></div>
                <div class="scan-line"></div>
                <span class="ai-text">AI</span>
            </div>
            <div class="text-center mb-12">
                <h2 class="text-xl font-bold mb-2 tracking-tighter">분석 중입니다...</h2>
                <p class="text-gray-400 text-sm">최적의 솔루션을 스캔하고 있습니다.</p>
            </div>
            <div class="w-full max-w-[240px] space-y-4">
                <div class="flex items-center gap-3 opacity-0 transition-all duration-500" id="load-1"><div class="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#00f2fe]"></div><span class="text-sm font-medium text-gray-300">데이터 스캔 완료</span></div>
                <div class="flex items-center gap-3 opacity-0 transition-all duration-500" id="load-2"><div class="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#00f2fe]"></div><span class="text-sm font-medium text-gray-300">솔루션 패턴 매칭</span></div>
                <div class="flex items-center gap-3 opacity-0 transition-all duration-500" id="load-3"><div class="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#00f2fe]"></div><span class="text-sm font-medium text-gray-300">최적 경로 탐색 완료</span></div>
            </div>
        </div>

        <!-- STEP 3: 상세 결과 -->
        <div id="step3" class="step-content pb-20">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black mt-2 tracking-tight">최적의 솔루션을 찾았습니다!</h2>
            </div>
            <div id="solution-detail" class="glass-card p-6 mb-8 relative overflow-hidden">
                <div id="top-accent-bar" class="absolute top-0 left-0 w-full h-1.5"></div>
            </div>
            <div class="mb-10">
                <h4 class="text-white font-bold mb-4 flex items-center gap-2 text-base px-1">✦ 함께 보면 좋은 솔루션</h4>
                <div id="rec-area"></div>
            </div>
            <button onclick="goToStep(2)" class="w-full py-4 rounded-xl border border-white/10 bg-white/5 text-gray-400 font-semibold transition-all">다른 고민 해결하기</button>
        </div>
    </div>

    <script>
        const BOOTH_COLORS = { 1: "#f39233", 2: "#d65b93", 3: "#874b91", 4: "#2b9b98", 5: "#82cf55", 6: "#3b3c94", 7: "#2b8ccf" };
        const BOOTH_MAPS = { 1: "1T87P0bt3XNaghOFpyjhmEPIMwo-xJd9W", 2: "1L9R3ssdKGygEJgGX5i5vCVqIOQip89G3", 3: "1wXqu8BYAt3zW9HNPW9xVD-JjsOd6zIgL", 4: "1zs3jerMHGXpVCd5Rx1Q2lfkpFx2snkWn", 5: "1EPzq1DyssQUk-EPlyIhWrHGU5QU-jUmf", 6: "1A7U6JclCKjJGH8V1dqlHa08ERVzW5C5-", 7: "1lbExUnG7hmUwhNpI7__tOJRB1PgTdHCh" };

        const data = [
            { id: 1, booth: 1, emoji: "🔒", pain: "클라우드는 쓰고 싶은데, <span class='highlight'>데이터가 외부로 나갈까</span> 봐 계속 마음이 불안해요.", title: "Azure with KT SPC", keywords:["데이터 주권", "강력 보안"], desc: "보안 체계를 더한 안정적인 클라우드입니다.", detail: "국내 기업 데이터 보안에 특화된 하이퍼스케일 인프라를 제공합니다." },
            { id: 2, booth: 2, emoji: "📊", pain: "데이터는 계속 늘어나는데, <span class='highlight'>인프라가 못 따라와서 속도랑 확장성</span>이 발목을 잡아요.", title: "MAGMA 빅데이터 플랫폼", keywords:["인프라 확장", "빅데이터"], desc: "데이터와 AI 워크로드를 통합하여 시스템 한계를 극복합니다.", detail: "인프라 비용 절감과 데이터 처리 성능 극대화를 지원합니다." },
            { id: 3, booth: 3, emoji: "💼", pain: "고객 상황에 맞춰 설명하고 보험 설계까지 가야 하는데, <span class='highlight'>다 수작업이에요.</span>", title: "AI 보험 세일즈 어시스턴트", keywords:["상담 자동화", "약관 분석"], desc: "보험 정보를 AI가 분석해 최적의 화법을 제안합니다.", detail: "설계사의 업무 효율을 획기적으로 높여주는 지능형 솔루션입니다." },
            { id: 4, booth: 4, emoji: "🔍", pain: "매뉴얼이 있어도, <span class='highlight'>현장에서는 바로 쓰기 어렵고</span> 외산 설비는 더 힘들어요.", title: "설비 LLM Agent", keywords:["멀티모달 RAG", "제조 특화"], desc: "도면과 차트까지 이해하는 AI가 현장 질문에 즉각 답을 제시합니다.", detail: "제조 현장에 최적화된 고도의 기술 지식 검색 에이전트입니다." },
            { id: 5, booth: 4, emoji: "⚡", pain: "GPU만 있으면 바로 시작될 줄 알았는데, <span class='highlight'>세팅/운영에서 계속 막혀요.</span>", title: "K GPUaaS", keywords:["GPU 클라우드", "온디맨드"], desc: "고성능 GPU를 구독 형태로 사용하여 개발 속도를 높입니다.", detail: "낮은 지연 시간과 합리적 비용의 GPU 인프라를 클라우드로 제공합니다." },
            { id: 6, booth: 5, emoji: "🌐", pain: "대형 회의나 웨비나 때는 <span class='highlight'>번역 품질이랑 안정성이 항상 불만</span>입니다.", title: "AI Translator", keywords:["Teams 연동", "실시간 번역"], desc: "Teams 회의 중 다국어를 실시간 번역하여 장벽을 허물어 줍니다.", detail: "기업용 보안성을 갖춘 안정적인 협업 통역 플랫폼입니다." },
            { id: 7, booth: 5, emoji: "🔄", pain: "견적 한 번 내는 데 <span class='highlight'>사람이 너무 많이 개입돼요.</span>", title: "영업 및 견적 Agent", keywords:["업무 자동화", "업무 효율"], desc: "대화만으로 DB를 조회하고 견적서 초안까지 AI가 완성합니다.", detail: "지능형 워크플로우를 수행하는 영업 에이전트입니다." },
            { id: 8, booth: 6, emoji: "💻", pain: "개발 요구사항이 계속 바뀌는데, <span class='highlight'>정리는 항상 사람 손</span>이에요.", title: "AxDD", keywords:["생산성 향상", "자산 통합"], desc: "파편화된 개발 자산을 통합하여 프로젝트 속도를 높여줍니다.", detail: "요구사항 정의부터 전 과정을 관리하는 스마트 포털입니다." },
            { id: 9, booth: 7, emoji: "💡", pain: "실제 AX를 도입하려고 하지만, <span class='highlight'>실행 전략을 해결해줄 컨설팅</span>이 필요해요.", title: "Innovation Hub 컨설팅", keywords:["전문 컨설팅", "전략 설계"], desc: "맞춤형 AX 도입 로드맵을 설계하여 성공적 전환을 돕습니다.", detail: "KT의 기술력과 노하우가 담긴 전문 AX 엔지니어링 프로세스입니다." }
        ];

        function goToStep(step) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            const target = step === 'loading' ? 'step-loading' : 'step' + step;
            const el = document.getElementById(target);
            if(el) el.classList.add('active');
            window.scrollTo(0, 0);
        }

        async function showSolution(id, isDirect = false) {
            const item = data.find(d => d.id === id);
            if (!isDirect) {
                goToStep('loading');
                for(let i=1; i<=3; i++) {
                    await new Promise(r => setTimeout(r, 700));
                    const el = document.getElementById(`load-${i}`);
                    if(el) el.classList.remove('opacity-0');
                }
                await new Promise(r => setTimeout(r, 500));
            }

            const boothColor = BOOTH_COLORS[item.booth];
            document.documentElement.style.setProperty('--booth-color', boothColor);
            const mapUrl = `https://drive.google.com/thumbnail?id=${BOOTH_MAPS[item.booth]}&sz=w800`;
            
            const detailContainer = document.getElementById('solution-detail');
            detailContainer.innerHTML = `
                <div id="top-accent-bar" class="absolute top-0 left-0 w-full h-1.5" style="background-color: ${boothColor}"></div>
                <div class="mb-4">
                    <h3 class="text-xl font-black text-white mb-4 leading-tight">${item.title}</h3>
                    <div class="flex flex-wrap gap-2 mb-6">${item.keywords.map(k => `<span class="px-2.5 py-1 bg-white/5 border border-white/10 rounded-lg text-[10px] font-semibold text-cyan-300">${k}</span>`).join('')}</div>
                    <div class="bg-white/5 rounded-2xl p-5 mb-8 border border-white/10">
                        <p class="text-[0.95rem] text-cyan-200 font-bold mb-3 leading-relaxed">"${item.desc}"</p>
                        <p class="text-[11px] text-gray-400 leading-relaxed">• ${item.detail}</p>
                    </div>
                    <div class="mt-8 border-t border-white/10 pt-8">
                        <div class="flex items-center justify-between mb-5 px-1">
                            <h4 class="text-white font-bold text-sm">📍 부스 위치 안내</h4>
                            <span class="animate-booth text-[10px] font-black px-4 py-1.5 rounded-xl text-white">BOOTH #${item.booth}</span>
                        </div>
                        <div class="rounded-2xl border border-white/10 overflow-hidden bg-gray-900 shadow-xl">
                            <img src="${mapUrl}" class="w-full h-auto block">
                        </div>
                        <p class="text-gray-400 text-xs mt-5 text-center leading-relaxed font-medium">
                            전시부스로 이동하시면</br> 더욱 자세한 설명을 들으실 수 있습니다.
                        </p>
                    </div>
                </div>
            `;

            const nextBooth = (item.booth % 7) + 1;
            const recSol = data.find(d => d.booth === nextBooth);
            document.getElementById('rec-area').innerHTML = `
                <div class="bg-gray-900/60 border border-white/10 rounded-2xl p-4 cursor-pointer active:scale-95 transition-all" onclick="showSolution(${recSol.id}, true)">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] font-bold text-blue-400 tracking-widest uppercase">Recommendation</span>
                        <span class="text-[9px] font-bold text-gray-400 bg-white/5 px-2 py-0.5 rounded border border-white/10">BOOTH #${recSol.booth}</span>
                    </div>
                    <h5 class="text-white font-bold text-xs mb-1">${recSol.title}</h5>
                    <p class="text-gray-500 text-[9px]">${recSol.keywords.join(' · ')}</p>
                </div>
            `;

            if(!isDirect) for(let i=1; i<=3; i++) {
                const el = document.getElementById(`load-${i}`);
                if(el) el.classList.add('opacity-0');
            }
            goToStep(3);
        }

        const listContainer = document.getElementById('painpoint-list');
        data.forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'glass-card flex items-start gap-4 p-5 cursor-pointer relative group';
            btn.onclick = () => showSolution(item.id);
            btn.innerHTML = `
                <div class="flex-shrink-0 text-xl mt-0.5">${item.emoji}</div>
                <div class="flex-1 text-[0.92rem] font-semibold text-gray-200 leading-snug tracking-tight group-hover:text-white transition-colors">
                    ${item.pain}
                </div>
                <div class="flex-shrink-0 self-center ml-1 opacity-20 group-hover:opacity-100 transition-opacity">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" class="text-gray-400"><path d="M9 5l7 7-7 7"></path></svg>
                </div>
            `;
            listContainer.appendChild(btn);
        });
    </script>
</body>
</html>
